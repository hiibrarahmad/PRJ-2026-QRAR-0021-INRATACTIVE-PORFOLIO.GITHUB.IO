<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Detection Debug</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0b0f14;
      color: #e7eef7;
      font-family: monospace;
      max-width: 100%;
      overflow: hidden;
    }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.9);
      padding: 15px;
      border: 2px solid #36c2a5;
      border-radius: 8px;
      max-height: 30%;
      overflow-y: auto;
      font-size: 12px;
      z-index: 1000;
    }
    #debug div {
      margin: 5px 0;
      padding: 5px;
    }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    .info { color: #36c2a5; }
    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    #canvas { display: none; }
    #qr-result {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.95);
      padding: 20px;
      border: 3px solid #36c2a5;
      border-radius: 8px;
      z-index: 1000;
      min-width: 300px;
    }
    .qr-found { border-color: #22c55e; }
    .qr-not-found { border-color: #ef4444; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  
  <div id="debug"></div>
  <div id="qr-result">
    <div>Status: <span id="status">Loading...</span></div>
    <div>Canvas Size: <span id="canvas-size">-</span></div>
    <div>QR Scans: <span id="scan-count">0</span></div>
    <div>QRs Detected: <span id="detected-count">0</span></div>
    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #36c2a5;">
      Last QR: <span id="last-qr" style="color: #22c55e;">None</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const debugEl = document.getElementById("debug");
    
    let scanCount = 0;
    let detectedCount = 0;
    
    function log(message, type = "info") {
      const div = document.createElement("div");
      div.className = type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      debugEl.insertBefore(div, debugEl.firstChild);
      
      // Keep only last 20 logs
      while (debugEl.children.length > 20) {
        debugEl.removeChild(debugEl.lastChild);
      }
      
      console.log(message);
    }
    
    async function startCamera() {
      try {
        log("Requesting camera...", "info");
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        log("✓ Camera stream obtained", "success");
        
        video.srcObject = stream;
        video.play();
        
        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            log(`✓ Video ready: ${video.videoWidth}x${video.videoHeight}`, "success");
            resolve();
          };
          setTimeout(resolve, 3000);
        });
        
        document.getElementById("status").textContent = "Scanning...";
        document.getElementById("status").className = "success";
        
        scanQR();
      } catch (err) {
        log(`✗ Camera error: ${err.message}`, "error");
        document.getElementById("status").textContent = "Camera Error";
        document.getElementById("status").className = "error";
      }
    }
    
    function scanQR() {
      if (video.readyState >= 2) {
        scanCount++;
        
        // Update canvas size
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        document.getElementById("canvas-size").textContent = `${canvas.width}x${canvas.height}`;
        document.getElementById("scan-count").textContent = scanCount;
        
        // Draw video to canvas
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Get image data
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        // Detect QR
        try {
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "attemptBoth",
          });
          
          if (code) {
            detectedCount++;
            log(`✓ QR Detected: "${code.data}"`, "success");
            document.getElementById("last-qr").textContent = code.data;
            document.getElementById("detected-count").textContent = detectedCount;
            document.getElementById("qr-result").classList.add("qr-found");
            document.getElementById("qr-result").classList.remove("qr-not-found");
          } else {
            if (scanCount % 30 === 0) {
              log("No QR in frame", "info");
            }
            document.getElementById("qr-result").classList.add("qr-not-found");
            document.getElementById("qr-result").classList.remove("qr-found");
          }
        } catch (err) {
          log(`✗ QR scan error: ${err.message}`, "error");
        }
      }
      
      requestAnimationFrame(scanQR);
    }
    
    // Check jsQR availability
    if (typeof jsQR === "undefined") {
      log("✗ jsQR library not loaded!", "error");
    } else {
      log("✓ jsQR library loaded", "success");
    }
    
    // Start
    startCamera();
  </script>
</body>
</html>
