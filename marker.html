<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>QRAR Portfolio - 3D AR Experience</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Sora", "Segoe UI", sans-serif;
      color: #e7eef7;
    }

    a-scene {
      width: 100%;
      height: 100%;
    }

    #camera-feed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      object-fit: cover;
    }

    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .panel {
      pointer-events: auto;
      background: rgba(10, 15, 22, 0.85);
      border: 1px solid rgba(54, 194, 165, 0.4);
      border-radius: 14px;
      padding: 14px 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      font-size: 14px;
    }

    #topbar {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 25;
      max-width: 50vw;
    }

    .badge {
      display: inline-block;
      background: #36c2a5;
      color: #0b0f14;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    #status, #repo-title, .repo-meta {
      margin-top: 6px;
    }

    #status {
      font-size: 13px;
      color: #b6c4d4;
    }

    #repo-title {
      font-weight: 700;
      color: #e7eef7;
      font-size: 16px;
    }

    .repo-meta {
      font-size: 12px;
      color: #9fb0c3;
    }

    #controls {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      z-index: 25;
      max-width: 420px;
      max-height: 50vh;
      overflow-y: auto;
      display: grid;
      gap: 12px;
    }

    .slider {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 12px;
      color: #9fb0c3;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
      pointer-events: auto;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    button {
      pointer-events: auto;
      background: #36c2a5;
      color: #0b0f14;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: opacity 0.2s;
    }

    button:active {
      opacity: 0.8;
    }

    button.secondary {
      background: #121c28;
      color: #e7eef7;
      border: 1px solid #223243;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 600px) {
      .panel {
        padding: 12px 14px;
        font-size: 13px;
      }
      
      button {
        padding: 8px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <!-- Camera feed for background -->
  <video id="camera-feed" autoplay playsinline muted webkit-playsinline></video>

  <!-- Debug Panel -->
  <div id="debug-panel" style="position: fixed; top: 12px; left: 12px; z-index: 999; background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace; font-size: 11px; padding: 12px; border: 1px solid #0f0; max-width: 300px; max-height: 200px; overflow-y: auto; border-radius: 4px; display: block;">
    <div style="margin-bottom: 8px; font-weight: bold;">📊 DEBUG LOG</div>
    <div id="debug-log" style="white-space: pre-wrap; word-break: break-all;"></div>
  </div>

  <!-- Test Mode Toggle -->
  <button id="test-mode-btn" style="position: fixed; top: 12px; right: 12px; z-index: 999; padding: 8px 12px; background: #0f0; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px;">TEST MODE</button>

  </div>

  <!-- UI Overlay -->
  <div id="overlay">
    <div id="topbar" class="panel hidden">
      <div class="badge">📍 3D AR Mode</div>
      <div id="status">Position camera at QR code...</div>
      <div id="repo-title">Loading portfolio...</div>
      <div class="repo-meta" id="repo-meta"></div>
    </div>

    <div id="controls" class="panel hidden">
      <div class="slider">
        <label>Transparency</label>
        <input id="opacity" type="range" min="0.2" max="1" step="0.05" value="0.85" />
      </div>
      <div class="slider">
        <label>Scale</label>
        <input id="scale" type="range" min="0.6" max="1.8" step="0.1" value="1" />
      </div>
      <div class="slider">
        <label>Distance</label>
        <input id="distance" type="range" min="0.5" max="3" step="0.1" value="1.2" />
      </div>
      <div class="btn-row">
        <button id="prev" class="secondary">← Prev</button>
        <button id="next" class="secondary">Next →</button>
        <button id="rotate" class="secondary">↻ Rotate</button>
      </div>
      <div class="btn-row">
        <button id="open">🔗 GitHub</button>
        <button id="zoom-in" class="secondary">+ View</button>
        <button id="exit" class="secondary">✕ Exit</button>
      </div>
    </div>
  </div>

  <!-- Canvas for QR detection -->
  <canvas id="qr-canvas" style="display: none;"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="assets/scan-minimal.js"></script>
</body>

</html>
