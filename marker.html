<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>QR Portfolio - 3D AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Sora", "Segoe UI", sans-serif;
      background: #000;
    }

    a-scene {
      width: 100%;
      height: 100%;
    }

    /* Debug Panel */
    #debug-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 999;
      background: rgba(0, 0, 0, 0.95);
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
      padding: 10px;
      border: 1px solid #0f0;
      max-width: 250px;
      max-height: 150px;
      overflow-y: auto;
      border-radius: 4px;
    }

    #debug-log {
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.3;
    }

    /* Status Panel */
    #status-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 999;
      background: rgba(0, 0, 0, 0.95);
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 200px;
      text-align: center;
    }

    #status-panel.detecting {
      background: rgba(0, 255, 0, 0.2);
      color: #0f0;
      border: 1px solid #0f0;
    }

    /* Test Button */
    #test-mode-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      padding: 12px 16px;
      background: #0f0;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    #test-mode-btn:active {
      transform: scale(0.95);
    }

    #test-mode-btn.active {
      background: #ff0000;
      color: #fff;
    }

    /* Hidden video for QR detection */
    video {
      display: none;
    }
    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Hidden video for QR detection -->
  <video id="camera-feed" autoplay playsinline muted webkit-playsinline></video>
  <canvas id="qr-canvas" style="display: none;"></canvas>

  <!-- 3D AR Scene with A-Frame -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <!-- Camera for AR -->
    <a-camera position="0 0 0" wasd-controls="acceleration: 75" look-controls></a-camera>
    
    <!-- Container for repo objects (will rotate with repos) -->
    <a-entity id="repo-container" position="0 0 -2" animation="property: rotation; to: 0 360 0; dur: 20000; easing: linear; loop: true">
      <!-- Repos will be added here dynamically -->
    </a-entity>

    <!-- Lighting -->
    <a-light type="ambient" color="#ffffff" intensity="1"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="5 5 5"></a-light>
  </a-scene>

  <!-- Debug Panel -->
  <div id="debug-panel">
    <div style="margin-bottom: 5px; font-weight: bold;">📊 DEBUG</div>
    <div id="debug-log"></div>
  </div>

  <!-- Status Panel -->
  <div id="status-panel">
    <div id="status-text">📷 Point at QR code</div>
  </div>

  <!-- Test Mode Button -->
  <button id="test-mode-btn">TEST MODE</button>

  <script>
    // Global refs
    const video = document.getElementById("camera-feed");
    const canvas = document.getElementById("qr-canvas");
    const debugLog = document.getElementById("debug-log");
    const statusText = document.getElementById("status-text");
    const statusPanel = document.getElementById("status-panel");
    const testModeBtn = document.getElementById("test-mode-btn");
    const repoContainer = document.getElementById("repo-container");

    // State
    let repos = [];
    let qrDetected = false;
    let testMode = false;
    let isScanning = false;
    const logs = [];

    // Logging
    function log(msg) {
      logs.push(msg);
      if (logs.length > 20) logs.shift();
      debugLog.textContent = logs.join("\n");
      console.log(msg);
    }

    // Setup
    log("🚀 Initializing 3D AR");

    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    // Fetch repos
    log("📡 Fetching repos...");
    fetch("https://api.github.com/users/hiibrarahmad/repos?per_page=8&sort=updated")
      .then(r => r.json())
      .then(data => {
        if (Array.isArray(data)) {
          repos = data;
          log(`✓ Got ${repos.length} repos`);
          createRepoObjects();
        }
      })
      .catch(e => log(`❌ GitHub: ${e.message}`));

    // Create 3D repo objects
    function createRepoObjects() {
      repoContainer.innerHTML = "";
      const angleStep = (Math.PI * 2) / repos.length;
      
      repos.forEach((repo, i) => {
        const angle = i * angleStep;
        const x = Math.cos(angle) * 2;
        const z = Math.sin(angle) * 2;
        const y = (i % 2) * 1.5 - 0.75;

        // Create entity
        const entity = document.createElement("a-entity");
        entity.setAttribute("class", "repo-box");
        entity.setAttribute("position", `${x} ${y} ${z}`);
        
        // Add box
        const box = document.createElement("a-box");
        box.setAttribute("width", "1.2");
        box.setAttribute("height", "1.2");
        box.setAttribute("depth", "0.3");
        box.setAttribute("color", `hsl(${(i * 360) / repos.length}, 80%, 60%)`);
        box.setAttribute("material", "emissive: #222");
        
        // Add text
        const text = document.createElement("a-text");
        text.setAttribute("value", repo.name.substring(0, 15));
        text.setAttribute("align", "center");
        text.setAttribute("color", "#fff");
        text.setAttribute("font-size", "0.5");
        text.setAttribute("position", "0 0 0.2");
        text.setAttribute("billboard", "");

        box.appendChild(text);
        entity.appendChild(box);
        
        // Click handler
        entity.addEventListener("click", () => {
          window.open(repo.html_url, "_blank");
          log(`🔗 Opened: ${repo.name}`);
        });

        repoContainer.appendChild(entity);
      });

      log(`✓ Created ${repos.length} 3D repo objects`);
    }

    // Start camera and QR scanning
    async function startScanning() {
      try {
        log("📹 Starting camera...");
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 480 }, height: { ideal: 360 } },
          audio: false
        });
        
        video.srcObject = stream;
        video.play().catch(e => log(`⚠️ Play: ${e.message}`));
        
        log("✓ Camera started");
        statusText.textContent = "📷 Scanning...";
        isScanning = true;
        scanFrame();
      } catch (err) {
        log(`❌ Camera: ${err.message}`);
        statusText.textContent = `❌ ${err.message}`;
      }
    }

    // QR scan loop
    function scanFrame() {
      if (!isScanning) return;

      if (video.readyState !== video.HAVE_ENOUGH_DATA) {
        requestAnimationFrame(scanFrame);
        return;
      }

      const w = video.videoWidth;
      const h = video.videoHeight;

      if (w <= 0 || h <= 0) {
        requestAnimationFrame(scanFrame);
        return;
      }

      canvas.width = w;
      canvas.height = h;

      try {
        ctx.drawImage(video, 0, 0, w, h);
        const imageData = ctx.getImageData(0, 0, w, h);

        if (typeof jsQR === "function") {
          const code = jsQR(imageData.data, w, h, { inversionAttempts: "attemptBoth" });
          
          if (code && code.data) {
            if (!qrDetected) {
              qrDetected = true;
              log(`✅ QR: ${code.data.substring(0, 30)}`);
              statusText.textContent = "✅ QR Found!";
              statusPanel.classList.add("detecting");
              showRepos();
            }
          } else {
            if (qrDetected) {
              qrDetected = false;
              statusText.textContent = "📷 Scanning...";
              statusPanel.classList.remove("detecting");
            }
          }
        }
      } catch (e) {
        // Silent fail on canvas errors
      }

      requestAnimationFrame(scanFrame);
    }

    // Show/hide repos
    function showRepos() {
      repoContainer.style.opacity = "1";
      log("👾 Repos visible - click to open!");
    }

    function hideRepos() {
      repoContainer.style.opacity = "0";
      log("👾 Repos hidden");
    }

    // Test mode
    testModeBtn.addEventListener("click", () => {
      testMode = !testMode;
      if (testMode) {
        testModeBtn.classList.add("active");
        testModeBtn.textContent = "TEST ON";
        log("🧪 TEST MODE");
        showRepos();
        qrDetected = true;
        statusText.textContent = "🧪 TEST: QR Simulated";
        statusPanel.classList.add("detecting");
      } else {
        testModeBtn.classList.remove("active");
        testModeBtn.textContent = "TEST MODE";
        hideRepos();
        qrDetected = false;
        statusText.textContent = "📷 Test off";
        statusPanel.classList.remove("detecting");
      }
    });

    // Start on load
    window.addEventListener("load", () => {
      log("⏳ Waiting for user gesture...");
      if (repos.length > 0) {
        startScanning();
      } else {
        setTimeout(() => {
          if (repos.length === 0) {
            log("⚠️ Repos not loaded yet");
            setTimeout(startScanning, 1000);
          } else {
            startScanning();
          }
        }, 500);
      }
    });

    // Also try immediately
    startScanning();
  </script>
</body>
</html>
