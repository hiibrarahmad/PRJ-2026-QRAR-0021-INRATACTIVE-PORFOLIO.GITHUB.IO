<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRAR Portfolio - Scan Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/ar.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>

<body>
  <video id="camera" autoplay playsinline></video>
  <canvas id="qr-canvas"></canvas>

  <div id="permission" style="position:fixed; inset:0; background:#0b0f14; color:#e7eef7; display:grid; place-items:center; z-index:20;">
    <div style="max-width:520px; padding:24px; border:1px solid #223243; border-radius:16px; background:#0f1720; text-align:center;">
      <h2 style="margin-top:0;">Enable Camera</h2>
      <p style="color:#9fb0c3;">Tap the button to allow camera access. Keep the QR marker visible to show the portfolio.</p>
      <button id="enable-camera" style="margin-top:12px;">Enable Camera</button>
      <p style="color:#9fb0c3; font-size:0.85rem; margin-top:16px;">QR marker: <a href="assets/qr-marker.png" style="color:#36c2a5">Download</a></p>
    </div>
  </div>

  <div id="overlay">
    <div id="topbar" class="panel hidden">
      <div class="badge">QR Scan Mode</div>
      <div id="status" class="repo-meta">QR detected</div>
      <div id="repo-title">Loading?</div>
      <div id="repo-desc" class="repo-meta"></div>
      <div id="repo-meta" class="repo-meta"></div>
    </div>

    <div id="controls" class="panel hidden">
      <div class="slider">
        <label>Transparency</label>
        <input id="opacity" type="range" min="0.2" max="1" step="0.05" value="0.9" />
      </div>
      <div class="slider">
        <label>Scale</label>
        <input id="scale" type="range" min="0.6" max="1.2" step="0.05" value="1" />
      </div>
      <div class="btn-row">
        <button class="secondary" id="prev">Prev</button>
        <button class="secondary" id="next">Next</button>
        <button class="secondary" id="open">Open Repo</button>
      </div>
      <div class="btn-row">
        <button class="secondary" id="rotate-left">Rotate Left</button>
        <button class="secondary" id="rotate-right">Rotate Right</button>
      </div>
      <div class="repo-meta">
        QR marker: <a href="assets/qr-marker.png" style="color:#36c2a5">Download</a>
      </div>
    </div>
  </div>

  <script src="assets/scan.js"></script>
</body>

</html>
