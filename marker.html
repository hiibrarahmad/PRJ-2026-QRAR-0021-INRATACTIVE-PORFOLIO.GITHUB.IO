<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRAR Portfolio - Marker Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/ar.css" />
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/aframe/build/aframe-ar.js"></script>
</head>

<body>
  <div id="permission" style="position:fixed; inset:0; background:#0b0f14; color:#e7eef7; display:grid; place-items:center; z-index:20;">
    <div style="max-width:520px; padding:24px; border:1px solid #223243; border-radius:16px; background:#0f1720; text-align:center;">
      <h2 style="margin-top:0;">Enable Camera</h2>
      <p style="color:#9fb0c3;">Tap the button to allow camera access. If you opened this from the iPhone camera preview, tap the Safari icon and open in Safari.</p>
      <button id="enable-camera" style="margin-top:12px;">Enable Camera</button>
      <p style="color:#9fb0c3; font-size:0.85rem; margin-top:16px;">Marker image: <a href="assets/qr-marker.png" style="color:#36c2a5">Download QR Marker</a></p>
    </div>
  </div>
  <div id="overlay">
    <div id="topbar" class="panel">
      <div class="badge">Marker AR Mode</div>
      <div id="status" class="repo-meta">Point the camera at the QR marker</div>
      <div id="repo-title">Loading?</div>
      <div id="repo-desc" class="repo-meta"></div>
      <div id="repo-meta" class="repo-meta"></div>
    </div>

    <div id="controls" class="panel">
      <div class="btn-row">
        <button id="enter-ar" class="secondary">Marker mode</button>
        <a href="index.html"><button type="button" class="secondary">Back</button></a>
      </div>
      <div class="slider">
        <label>Transparency</label>
        <input id="opacity" type="range" min="0.2" max="1" step="0.05" value="0.9" />
      </div>
      <div class="slider">
        <label>Scale</label>
        <input id="scale" type="range" min="0.5" max="1.8" step="0.1" value="1" />
      </div>
      <div class="btn-row">
        <button class="secondary" id="prev">Prev</button>
        <button class="secondary" id="next">Next</button>
        <button class="secondary" id="open">Open Repo</button>
      </div>
      <div class="btn-row">
        <button class="secondary" id="rotate-left">Rotate Left</button>
        <button class="secondary" id="rotate-right">Rotate Right</button>
      </div>
      <div class="repo-meta">
        Marker image: <a href="assets/qr-marker.png" style="color:#36c2a5">Download</a>
      </div>
    </div>
  </div>

  <a-scene embedded vr-mode-ui="enabled: false" renderer="colorManagement: true; precision: medium; antialias: true"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
    <a-marker type="pattern" url="assets/qr-marker.patt">
      <a-entity id="panel" position="0 0.5 0" rotation="-90 0 0">
        <a-plane id="panel-bg" width="1.2" height="0.7" color="#0f1720" opacity="0.9" material="transparent: true"></a-plane>
        <a-text id="panel-title" value="Loading?" color="#e7eef7" align="center" width="1.2" position="0 0.18 0.01" wrap-count="22"></a-text>
        <a-text id="panel-desc" value="Fetching portfolio" color="#b6c4d4" align="center" width="1.1" position="0 0.0 0.01" wrap-count="40"></a-text>
        <a-text id="panel-meta" value="" color="#36c2a5" align="center" width="1.1" position="0 -0.22 0.01" wrap-count="30"></a-text>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    window.APP_MODE = "marker";
  </script>
  <script src="assets/ar.js"></script>
</body>

</html>
